<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Virtual Wellbeing</title>
    <link rel="stylesheet" href="ContactInfo.css">
      <script defer src="ContactInfo.js"></script>
</head>

<body>
    <section class="contact-page">
        <div class="container">
            <h2>Contact Us</h2>
            <div class="contact-info">
                <p><i class="fas fa-map-marker-alt"></i> 123 Serenity Lane, Virtual City, VC 12345</p>
                <p><i class="fas fa-phone"></i> +1 (555) 123-4567</p>
                <p><i class="fas fa-envelope"></i> support@virtualwellbeing.com</p>
            </div>
            <form id="contactForm">
                <input type="text" id="name" name="name" placeholder="Your Name" required>
                <input type="email" id="email" name="email" placeholder="Your Email" required>
                <textarea id="message" name="message" placeholder="Your Message" required></textarea>
                <button type="submit">Send Message</button>
            </form>
             <p id="successMessage" class="success-message">Message sent! Thank you for your response.</p>
        </div>

        <div class="bubbles">
            <!-- Bubbles will be generated here by JavaScript -->
        </div>
    </section>

    <script src="ContactInfo.js"></script>
</body>

</html>
