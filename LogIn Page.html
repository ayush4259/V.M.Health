<!-- HTML -->
<section class="login-section">
    <div class="parallax-bg"></div>
    <div class="login-container">
        <h2>Log In</h2>
        <link rel="stylesheet" href="LogIn Page.css">
        <script defer src="LogIn Page.js"></script>
        <form class="login-form">
            <div class="form-group">
                <label for="email">Email ID</label>
                <input type="email" id="email" name="email" placeholder="Your Email" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Your Password" required>
            </div>
            <button type="submit" class="login-button">Log In</button>
        </form>
        <div class="social-login">
            <button class="google-button" onclick="location.href='https://www.google.com/'">
                <i class="fab fa-google"></i> Sign In with Google
            </button>
            <button class="linkedin-button" onclick="location.href='https://www.linkedin.com/'">
                <i class="fab fa-linkedin"></i> Sign In with LinkedIn
            </button>
        </div>
        <div class="animation-element"></div>
    </div>
</section>
